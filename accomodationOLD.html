<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Under Construction — MTERMS 2026</title>

  <style>
    /* Clean, modern styling for the under construction page */
    :root {
      --bg: #f9fafb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --brand: #1e5aa8;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .construction-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 30px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    /* Logo Styling */
    .logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .logo-container img {
      height: 70px;
      width: auto;
      object-fit: contain;
    }

    .main-logo {
      height: 90px !important; /* Make the MTERMS logo slightly larger */
    }

    .divider {
      height: 40px;
      width: 1px;
      background-color: var(--border);
      margin: 0 10px;
    }

    /* Text Styling */
    h1 {
      font-size: 28px;
      margin: 0 0 15px 0;
      font-weight: 700;
      color: var(--text);
    }

    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 25px 0;
    }

    .btn {
      display: inline-block;
      background: var(--brand);
      color: #ffffff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    /* Responsive adjustment for mobile devices */
    @media (max-width: 500px) {
      .divider {
        display: none;
      }
      .logo-container {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="construction-card">
    
    <div class="logo-container">
      <img src="public/mterm.jpg" alt="MTERMS Logo" class="main-logo">
      <div class="divider"></div>
      <img src="public/uitm.png" alt="UITM Logo">
      <img src="public/tesma.png" alt="TESMA Logo">
    </div>

    <h1>Page Under Construction</h1>
    
    <p>
      We are currently updating this section for the <strong>Malaysian Tissue Engineering & Regenerative Medicine Scientific Meeting (MTERMS 2026)</strong>. 
      Please check back later for new information and updates.
    </p>

    <a href="index.html" class="btn">Return to Homepage</a>

  </div>

</body>
</html>
