<!-- admin-presentation-review.html (place next to admin.html) -->
<div id="adPresWrap" style="border:1px solid var(--border);border-radius:10px;padding:12px;background:#f9fafb">
  <div style="font-weight:800;margin-bottom:6px">Presentation Materials (for review)</div>

  <div class="grid-2" style="gap:12px">
    <div style="border:1px solid var(--border);border-radius:10px;padding:12px;background:#fff">
      <div style="font-weight:700;margin-bottom:6px">Latest Oral Slides (PDF)</div>
      <div id="adSlidesBox">Loading…</div>
    </div>

    <div style="border:1px solid var(--border);border-radius:10px;padding:12px;background:#fff">
      <div style="font-weight:700;margin-bottom:6px">Latest Poster (PDF / JPG / PNG)</div>
      <div id="adPosterBox">Loading…</div>
    </div>
  </div>

  <div class="help" style="margin-top:10px">
    Tip: If the participant is locked to poster, they should upload a poster file only. Oral participants should upload slides only.
  </div>
</div>
